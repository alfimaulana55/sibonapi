<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Informasi Pengeluaran Bon Narapidana</title>
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #3498db;
            --success: #2ecc71;
            --warning: #f1c40f;
            --danger: #e74c3c;
            --light: #ecf0f1;
            --dark: #2c3e50;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f6fa;
            margin: 0;
            padding: 0;
        }
        .header {
            background-color: var(--primary);
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .simulator-nav {
            background-color: var(--warning);
            padding: 10px;
            text-align: center;
            font-weight: bold;
        }
        .simulator-nav button {
            margin: 0 5px;
            padding: 5px 15px;
            cursor: pointer;
            font-weight: bold;
        }
        .container {
            max-width: 1350px; /* Diperlebar sedikit karena kolom tabel bertambah */
            margin: 20px auto;
            padding: 0 20px;
        }
        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            overflow-x: auto;
        }
        
        /* LOGIN PAGE STYLES */
        #loginPage {
            max-width: 400px;
            margin: 100px auto;
            text-align: center;
        }
        .login-box {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .login-box input {
            width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #bdc3c7; border-radius: 4px; box-sizing: border-box;
        }
        .login-box button {
            width: 100%; background-color: var(--accent); color: white; border: none; padding: 12px;
            border-radius: 4px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
        .login-box p { font-size: 13px; color: #7f8c8d; }

        /* FORM STYLES */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; }
        .form-group select, .form-group input {
            width: 100%; padding: 10px; border: 1px solid #bdc3c7; border-radius: 4px; box-sizing: border-box;
        }
        
        /* DYNAMIC NAPI ROW STYLES */
        .napi-row {
            display: flex; gap: 10px; margin-bottom: 10px; align-items: center;
        }
        .napi-number {
            font-weight: bold; width: 25px; text-align: right; flex-shrink: 0; color: var(--secondary); font-size: 15px;
        }
        .napi-row input { flex: 1; }
        .btn-remove-napi {
            background-color: var(--danger); color: white; border: none; width: 38px; height: 38px;
            border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 16px;
            display: flex; justify-content: center; align-items: center; flex-shrink: 0;
        }
        .btn-add-napi {
            background-color: #ecf0f1; color: var(--dark); border: 1px dashed #bdc3c7; padding: 10px;
            border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; margin-bottom: 15px;
        }
        .btn-add-napi:hover { background-color: #e0e6ed; }

        button.btn-submit {
            background-color: var(--accent); color: white; border: none; padding: 12px 20px;
            border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px;
        }
        
        /* TABLE STYLES */
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 13px;
